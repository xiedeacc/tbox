syntax = "proto3";

package tbox.proto;

message BaseConfig {
  string server_addr = 1;
  string server_domain = 2;
  uint32 grpc_server_port = 3;
  uint32 http_server_port = 4;
  uint32 grpc_threads = 5;
  uint32 event_threads = 6;
  bool use_https = 7;
  string user = 8;
  string password = 9;
  string hosted_zone_id = 10;
}
